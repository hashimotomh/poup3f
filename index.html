<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Passa ou Repassa - Elementos dos Mapas</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-time-a: #e74c3c;
            --cor-time-b: #3498db;
            --cor-fundo: #1a1a1a;
            --cor-detalhe: #f1c40f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--cor-fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            touch-action: manipulation;
        }

        header {
            text-align: center;
            padding: 10px;
            width: 100%;
            background: rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--cor-detalhe);
            z-index: 100;
        }

        h1 {
            font-family: 'Bungee', cursive;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: var(--cor-detalhe);
            text-shadow: 2px 2px 0px #000;
        }

        /* Área de Controles no Topo */
        .controles-topo {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn-acao {
            padding: 8px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        #btn-reset-rodada { background-color: #7f8c8d; }
        #btn-reset-placar { background-color: #c0392b; }
        
        .btn-acao:active { transform: translateY(2px); box-shadow: none; }

        /* Placar */
        .placar-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .score-box { text-align: center; }
        .score-label { font-family: 'Bungee', cursive; font-size: 0.9rem; opacity: 0.8; }
        .score-num { font-size: 4.5rem; font-weight: 900; line-height: 1; }
        .score-a { color: var(--cor-time-a); }
        .score-b { color: var(--cor-time-b); }

        /* Área de Jogo */
        .container-jogadores {
            display: flex;
            width: 100%;
            flex: 1;
            padding: 20px;
            gap: 20px;
            box-sizing: border-box;
        }

        .botao-player {
            flex: 1;
            border: none;
            border-radius: 30px;
            font-family: 'Bungee', cursive;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 15px 0px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #btn-esquerda { background-color: var(--cor-time-a); }
        #btn-direita { background-color: var(--cor-time-b); }

        .btn-ponto {
            margin-top: 25px;
            padding: 15px 30px;
            background: #fff;
            color: #000;
            border-radius: 15px;
            font-size: 1.5rem;
            font-family: 'Bungee', cursive;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Efeitos */
        .vencedor {
            animation: pulse-brilho 0.5s infinite alternate;
            border: 12px solid #fff !important;
            z-index: 50;
        }
        .vencedor .btn-ponto { display: block; }

        .bloqueado {
            opacity: 0.1;
            filter: grayscale(100%);
            pointer-events: none;
        }

        @keyframes pulse-brilho {
            from { box-shadow: 0 0 20px #fff, 0 0 40px var(--cor-detalhe); transform: scale(1); }
            to { box-shadow: 0 0 50px #fff, 0 0 100px var(--cor-detalhe); transform: scale(1.02); }
        }

        @media (max-width: 600px) {
            .score-num { font-size: 3rem; }
            h1 { font-size: 1.2rem; }
            .botao-player { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ELEMENTOS DOS MAPAS</h1>
        
        <div class="controles-topo">
            <button id="btn-reset-rodada" class="btn-acao" onclick="resetarRodada()">Limpar Botões</button>
            <button id="btn-reset-placar" class="btn-acao" onclick="resetarPlacar()">Zerar Placar</button>
        </div>

        <div class="placar-container">
            <div class="score-box">
                <span class="score-label">TIME A</span>
                <div id="score-a" class="score-num score-a">0</div>
            </div>
            <div class="score-box">
                <span class="score-label">TIME B</span>
                <div id="score-b" class="score-num score-b">0</div>
            </div>
        </div>
    </header>

    <div class="container-jogadores">
        <button id="btn-esquerda" class="botao-player" onclick="registrarClique('esquerda')">
            TIME A
            <div class="btn-ponto" onclick="adicionarPonto('A', event)">+ PONTO!</div>
        </button>
        <button id="btn-direita" class="botao-player" onclick="registrarClique('direita')">
            TIME B
            <div class="btn-ponto" onclick="adicionarPonto('B', event)">+ PONTO!</div>
        </button>
    </div>

    <script>
        let jogoAtivo = true;
        let pontosA = 0;
        let pontosB = 0;

        function registrarClique(lado) {
            if (!jogoAtivo) return;
            jogoAtivo = false;

            const btnEsquerda = document.getElementById('btn-esquerda');
            const btnDireita = document.getElementById('btn-direita');

            if (lado === 'esquerda') {
                btnEsquerda.classList.add('vencedor');
                btnDireita.classList.add('bloqueado');
            } else {
                btnDireita.classList.add('vencedor');
                btnEsquerda.classList.add('bloqueado');
            }
        }

        function adicionarPonto(time, event) {
            event.stopPropagation();
            if (time === 'A') {
                pontosA++;
                document.getElementById('score-a').innerText = pontosA;
            } else {
                pontosB++;
                document.getElementById('score-b').innerText = pontosB;
            }
            resetarRodada();
        }

        function resetarRodada() {
            jogoAtivo = true;
            document.getElementById('btn-esquerda').classList.remove('vencedor', 'bloqueado');
            document.getElementById('btn-direita').classList.remove('vencedor', 'bloqueado');
        }

        function resetarPlacar() {
            if(confirm("Zerar toda a pontuação?")) {
                pontosA = 0;
                pontosB = 0;
                document.getElementById('score-a').innerText = "0";
                document.getElementById('score-b').innerText = "0";
                resetarRodada();
            }
        }

        document.addEventListener('touchstart', function (e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
